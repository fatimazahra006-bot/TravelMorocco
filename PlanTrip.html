<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Morocco | Plan Your Trip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap">
    <style></style>
</head>
<body>
    <div>
        <header>
            <div>
                <h1>Plan <span>Your Trip</span></h1>
                <p>Start planning your perfect journey to Morocco with our easy-to-use trip planner.</p>
            </div>

            <div>
            <button>Clear Plan</button>
            <button>Download PDF Plan</button>
            </div>
        </header>

        <div>
            <div>
                <div>
                    <h3>
                        <span>🌍</span> Reserved places
                    </h3>
                    <p>Select the places you want to include in today's generation.</p>
                    <div>
                        <div>No reservations found.<br>Go to Destinations first.
                        </div>
                    </div>
                </div>
            </div>

            <div>
               <div>
                <div>
                    <h4>Trip Duration</h4>
                    <p>Select the duration of your trip.</p>
                </div>

                <div>
                    <button>2 Days</button>
                    <button>3 Days</button>
                    <button>5 Days</button>
                    <button>7 Days</button>
                </div>
               </div>
               
               <div><!-- balise vide -->
               </div>
            </div>
        </div>
    </div>
</body>
